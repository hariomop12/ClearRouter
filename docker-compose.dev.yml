services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: clearrouter
      POSTGRES_PASSWORD: clearrouter_pass
      POSTGRES_DB: clearrouter           
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
    ports:
      - "5432:5432"
    volumes:
      - clearrouter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearrouter"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .  
      dockerfile: apps/backend/Dockerfile
    command: ["air", "-c", "/app/.air.toml"]
    environment:
      - DATABASE_URL=postgres://clearrouter:clearrouter_pass@postgres:5432/clearrouter?sslmode=disable
      - GIN_MODE=debug
      - GORM_DEBUG=true
      - SEED_ENABLE=true
      - JWT_SECRET=jssvdhkrhel74893hhfsldk
      - OPENAI_API_KEY=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
      - GOOGLE_API_KEY=AIzaSyCgL54fVOF4IJOPXWeqbuENgMR374j9bQY
      - ANTHROPIC_API_KEY=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
      - DEEPSEEK_API_KEY=sk-4ea366d3917f4980b67b059a1b21c778
      - MISTRAL_API_KEY=sk-mistral1-3b7d8f4e-6c3a-4f0e-9c8e-8f2b3c4d5e6f
      - RAZORPAY_key_id=rzp_test_RMdWZKqulEGpGi
      - RAZORPAY_key_secret=IlJH0rSW45XVTXZtVu9oTiBu
      - RAZORPAY_WEBHOOK_SECRET=fcfJ_F@RXJ8dq27
