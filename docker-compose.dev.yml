      - SMTP_PORT=587
      - SMTP_USER=ddodexpert111@gmail.com
      - SMTP_PASS=oapecbkthfwerbfv
      - SMTP_FROM_EMAIL=ddodexpert111@gmail.com
      - SMTP_REPLY_TO_EMAIL=ddodexpert111@gmail.com
    working_dir: /app/apps/backend
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    ports:
      - "3000:5173"
    volumes:
      - .:/app
      - /app/apps/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  clearrouter_pgdata: {}
