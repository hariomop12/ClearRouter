root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server/main.go"
  bin = "./tmp/main"
  full_bin = ""
  include_ext = ["go"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", ".git"]
  include_dir = []
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"
  send_interrupt = false
  kill_delay = "500ms"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
  app = ""

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false