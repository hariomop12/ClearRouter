services:
  backend:
    container_name: clearrouter-backend
    build:
      context: .
      dockerfile: Dockerfile
      target: prod  # <--- Tells Docker to stop at the Air stage   
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - clearrouter-net

networks:
  clearrouter-net:
    driver: bridge
