services:
  backend:
    container_name: clearrouter-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    networks:
      - clear-router-network

  frontend:
    container_name: clearrouter-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - clear-router-network