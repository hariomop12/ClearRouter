services:
  backend:
    container_name: clearrouter-backend

    build:
      context: .
      dockerfile: Dockerfile.backend

    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - ./apps/backend/.env

    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/clearrouter?sslmode=disable"
      NODE_ENV: "production"
      PORT: "8080"
      GIN_MODE: "release"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - clear-router-network


  frontend:
    container_name: clearrouter-frontend

    build:
      context: .
      dockerfile: Dockerfile.frontend

    restart: unless-stopped

    ports:
      - "3002:80"

    environment:
      NODE_ENV: "production"
      REACT_APP_API_URL: "/api"

    depends_on:
      - backend

    networks:
      - clear-router-network


  db:
    container_name: clearrouter-db

    image: postgres:15-alpine

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clearrouter

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - clear-router-network


networks:
  clear-router-network:
    driver: bridge


volumes:
  postgres_data: