services:
  backend:
    container_name: clearrouter-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      # Optional: local overrides (not baked into images)
      - ./apps/backend/.env
    networks:
      - clear-router-network

  frontend:
    container_name: clearrouter-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NGINX_TEMPLATE: ${NGINX_TEMPLATE:-nginx.prod.template.conf}
    ports:
      - "3002:80"
    depends_on:
      - backend
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8080}
    networks:
      - clear-router-network

networks:
  clear-router-network:
    driver: bridge
