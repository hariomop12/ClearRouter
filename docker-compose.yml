services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: clearrouter
      POSTGRES_PASSWORD: clearrouter_pass
      POSTGRES_DB: router_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://clearrouter:clearrouter_pass@postgres:5432/router_db?sslmode=disable"
    depends_on:
      - postgres

volumes:
  pgdata:
