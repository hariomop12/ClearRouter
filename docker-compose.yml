services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: clearrouter
      POSTGRES_PASSWORD: clearrouter_pass
      POSTGRES_DB: clearrouter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearrouter"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile.prod
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://clearrouter:clearrouter_pass@postgres:5432/clearrouter?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
