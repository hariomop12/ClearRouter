services:
  backend:
    container_name: clearrouter-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/clearrouter?sslmode=disable"
      NODE_ENV: "production"
      PORT: "8080"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USERNAME: "hariomvirkhare02@gmail.com"
      SMTP_PASSWORD: "gknujkbqpejezupg"
      SMTP_FROM_EMAIL: "hariomvirkhare02@gmail.com"
      environment:
      GOOGLE_API_KEY: "AIzaSyCFecmihaU_4AZ8WIVYBCddrg_plmYTAVI"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - clear-router-network

  frontend:
    container_name: clearrouter-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - clear-router-network

  db:
    container_name: clearrouter-db
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clearrouter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clear-router-network

networks:
  clear-router-network:
    driver: bridge

volumes:
  postgres_data:
