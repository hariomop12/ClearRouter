# Air config for ClearRouter backend hot reload
# Runs inside the backend container

root = "."
tmp_dir = "tmp"

[build]
# Build the backend server binary into tmp and run it (use absolute paths to be robust against cwd changes)
cmd = "go build -buildvcs=false -o /app/tmp/backend /app/apps/backend/cmd/server"
bin = "/app/tmp/backend"
full_bin = "/app/tmp/backend"
include_ext = ["go", "mod", "sum"]
exclude_dir = ["tmp", "node_modules", ".git", "apps/frontend"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runtime = "magenta"

[env]
GIN_MODE = "debug"
GORM_DEBUG = "true"
