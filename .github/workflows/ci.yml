name: CI

on:
  push:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clearrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d clearrouter"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/clearrouter?sslmode=disable
      GIN_MODE: release
      SEED_DEFAULT_USER_EMAIL: admin@clearrouter.local
      SEED_DEFAULT_USER_PASSWORD: admin123
      SEED_DEFAULT_USER_NAME: Admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.4
          cache: true
          cache-dependency-path: apps/backend/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load database schema
        run: cat apps/backend/db/schema.sql | docker exec -i ${{ job.services.postgres.id }} psql -U postgres -d clearrouter

      - name: Start backend
        working-directory: apps/backend
        run: |
          nohup go run ./cmd/server > /tmp/clearrouter-backend.log 2>&1 &
          echo $! > /tmp/clearrouter-backend.pid

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health/super >/tmp/clearrouter-health.json; then
              cat /tmp/clearrouter-health.json
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready"
          cat /tmp/clearrouter-backend.log
          exit 1

      - name: Run Newman smoke tests
        run: pnpm dlx newman run apis/clearrouter.postman_collection.json -e apis/clearrouter.postman_environment.json --env-var baseUrl=http://127.0.0.1:8080

      - name: Build backend
        working-directory: apps/backend
        run: go build ./cmd/server

      - name: Build frontend
        run: pnpm --filter frontend build
